<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Future-of-Work Funding Tracker</title>
<style>
  :root {
    --bg:        #f5f7fb;
    --surface:   #ffffff;
    --border:    #e2e7f0;
    --text:      #1a1d2e;
    --muted:     #64748b;
    --accent:    #2563eb;
    --accent2:   #7c3aed;
    --green:     #16a34a;
    --yellow:    #b45309;
    --red:       #dc2626;
    --orange:    #ea580c;
    --teal:      #0d9488;
    --row-hover: #eef2fb;
    --panel-w:   420px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }
  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
  header .spacer { flex: 1; }
  header .updated { font-size: 11px; color: var(--muted); text-align: right; }

  /* ── Tabs ── */
  .tab-bar {
    display: flex;
    gap: 2px;
    padding: 16px 24px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 16px 12px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    display: flex; align-items: center; gap: 8px;
    transition: color 0.15s;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-badge {
    background: var(--border);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    color: var(--muted);
  }
  .tab.active .tab-badge { background: rgba(37,99,235,0.12); color: var(--accent); }

  /* ── Toolbar ── */
  .toolbar {
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--bg);
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 320px;
  }
  .search-wrap svg {
    position: absolute;
    left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    width: 14px; height: 14px;
  }
  .toolbar input, .toolbar select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .toolbar input { padding-left: 30px; width: 100%; }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .toolbar select option { background: var(--surface); }
  .result-count { font-size: 12px; color: var(--muted); margin-left: auto; white-space: nowrap; }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    padding: 0 24px 32px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
  }
  thead th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    user-select: none;
  }
  thead th:first-child { padding-left: 4px; }
  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--row-hover); }
  tbody tr.active-row { background: rgba(37,99,235,0.07); }
  tbody td {
    padding: 12px 12px;
    vertical-align: middle;
  }
  tbody td:first-child { padding-left: 4px; }

  /* ── Fit Badge ── */
  .fit-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 12px;
    white-space: nowrap;
  }
  .fit-5 { background: rgba(22,163,74,0.10); color: var(--green); }
  .fit-4 { background: rgba(37,99,235,0.10); color: var(--accent); }
  .fit-3 { background: rgba(180,83,9,0.10); color: var(--yellow); }
  .fit-2 { background: rgba(234,88,12,0.10); color: var(--orange); }
  .fit-1 { background: rgba(220,38,38,0.10); color: var(--red); }

  /* ── Name cell ── */
  .name-cell .org { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Type pill ── */
  .type-pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }
  .type-foundation { background: rgba(124,58,237,0.10); color: #6d28d9; }
  .type-government  { background: rgba(13,148,136,0.10);  color: var(--teal); }
  .type-corporate   { background: rgba(234,88,12,0.10);   color: var(--orange); }

  /* ── Amount ── */
  .amount-cell { font-variant-numeric: tabular-nums; white-space: nowrap; }

  /* ── Deadline cell ── */
  .dl-cell { white-space: nowrap; }
  .dl-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 6px;
  }
  .dl-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dl-soon    { background: rgba(22,163,74,0.10); color: var(--green); }
  .dl-soon    .dl-dot { background: var(--green); }
  .dl-open    { background: rgba(37,99,235,0.10); color: var(--accent); }
  .dl-open    .dl-dot { background: var(--accent); }
  .dl-tbc     { background: rgba(180,83,9,0.10); color: var(--yellow); }
  .dl-tbc     .dl-dot { background: var(--yellow); }
  .dl-rolling { background: rgba(13,148,136,0.10); color: var(--teal); }
  .dl-rolling .dl-dot { background: var(--teal); }
  .dl-passed  { background: rgba(100,116,139,0.10); color: var(--muted); }
  .dl-passed  .dl-dot { background: var(--muted); }

  /* ── Region ── */
  .region-cell { font-size: 12px; color: var(--muted); }

  /* ── Empty state ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  /* ── Detail Panel ── */
  .panel-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    backdrop-filter: blur(1px);
  }
  .panel-backdrop.open { display: block; }
  .detail-panel {
    position: fixed;
    top: 0; right: 0;
    height: 100vh;
    width: var(--panel-w);
    max-width: 92vw;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 101;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-panel.open { transform: translateX(0); }
  .panel-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .panel-header .ph-main { flex: 1; min-width: 0; }
  .panel-title {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.35;
    margin-bottom: 6px;
  }
  .panel-org { font-size: 12px; color: var(--muted); }
  .panel-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 4px;
    border-radius: 4px;
    flex-shrink: 0;
    line-height: 1;
    font-size: 18px;
  }
  .panel-close:hover { color: var(--text); background: var(--border); }
  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .panel-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .panel-desc {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
  }
  .panel-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .meta-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .meta-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .meta-value { font-size: 13px; font-weight: 500; }
  .panel-notes {
    background: rgba(180,83,9,0.06);
    border: 1px solid rgba(180,83,9,0.18);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.6;
    color: #92400e;
  }
  .panel-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
  }
  .btn-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 9px 18px;
    border-radius: 7px;
    text-decoration: none;
    transition: opacity 0.15s;
    width: 100%;
    justify-content: center;
  }
  .btn-link:hover { opacity: 0.88; }

  /* ── New badge ── */
  .new-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: var(--accent);
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
  }

  @media (max-width: 640px) {
    .toolbar { padding: 10px 12px; }
    .table-wrap { padding: 0 12px 24px; }
    header { padding: 14px 16px; }
    .tab-bar { padding: 12px 12px 0; }
    .tab { padding: 6px 12px 10px; font-size: 12px; }
  }
</style>
</head>

<header>
  <div class="logo">🔍</div>
  <div>
    <h1>AI Future-of-Work Funding Tracker</h1>
    <div class="subtitle">Grants, fellowships &amp; research funds at the intersection of AI &amp; labour</div>
  </div>
  <div class="spacer"></div>
  <div class="updated" id="updated-ts"></div>
</header>

<div class="tab-bar">
  <button class="tab active" id="tab-open" onclick="switchTab('open')">
    Open Calls <span class="tab-badge" id="badge-open">–</span>
  </button>
  <button class="tab" id="tab-archive" onclick="switchTab('archive')">
    Archive <span class="tab-badge" id="badge-archive">–</span>
  </button>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" id="q" placeholder="Search grants…" oninput="applyFilters()" />
  </div>
  <select id="f-type" onchange="applyFilters()">
    <option value="">All types</option>
    <option value="foundation">Foundation</option>
    <option value="government">Government</option>
    <option value="corporate">Corporate</option>
  </select>
  <select id="f-fit" onchange="applyFilters()">
    <option value="">All fit scores</option>
    <option value="5">⭐ 5 — Excellent</option>
    <option value="4">4 — Strong</option>
    <option value="3">3 — Moderate</option>
    <option value="2">2 — Low</option>
  </select>
  <select id="f-region" onchange="applyFilters()">
    <option value="">All regions</option>
    <option value="US">US</option>
    <option value="global">Global</option>
    <option value="EU">EU</option>
  </select>
  <span class="result-count" id="result-count"></span>
</div>

<div class="table-wrap">
  <table id="main-table">
    <thead>
      <tr>
        <th>Fit</th>
        <th>Name / Organisation</th>
        <th>Type</th>
        <th>Max Award</th>
        <th>Deadline</th>
        <th>Region</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-icon">🔎</div>
    <p>No matching grants found. Try adjusting your filters.</p>
  </div>
</div>

<!-- Detail Panel -->
<div class="panel-backdrop" id="backdrop" onclick="closePanel()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <div class="ph-main">
      <div class="panel-title" id="p-title"></div>
      <div class="panel-org" id="p-org"></div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap" id="p-badges"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">
    <div>
      <div class="panel-section-label">Description</div>
      <div class="panel-desc" id="p-desc"></div>
    </div>
    <div class="panel-meta-grid">
      <div class="meta-item">
        <div class="meta-label">Deadline</div>
        <div class="meta-value" id="p-deadline"></div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Award Amount</div>
        <div class="meta-value" id="p-amount"></div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Region</div>
        <div class="meta-value" id="p-region"></div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Date Added</div>
        <div class="meta-value" id="p-added"></div>
      </div>
    </div>
    <div id="p-notes-wrap" style="display:none">
      <div class="panel-section-label">Notes</div>
      <div class="panel-notes" id="p-notes"></div>
    </div>
  </div>
  <div class="panel-footer">
    <a href="#" id="p-link" class="btn-link" target="_blank" rel="noopener">
      View Grant Page ↗
    </a>
  </div>
</div>

// ── Helpers ────────────────────────────────────────────────────────────────
function dlStatus(d) {
  if (!d || d === 'TBC')   return 'tbc';
  if (d === 'rolling')     return 'rolling';
  const dl = new Date(d);
  if (dl < TODAY)          return 'passed';
  const days = (dl - TODAY) / 86400000;
  return days <= 60 ? 'soon' : 'open';
}

function dlLabel(d) {
  if (!d || d === 'TBC')  return 'TBC';
  if (d === 'rolling')    return 'Rolling';
  const dl = new Date(d);
  if (dl < TODAY)         return d;
  const days = Math.round((dl - TODAY) / 86400000);
  if (days === 0)         return 'Today';
  if (days === 1)         return 'Tomorrow';
  if (days < 30)          return `${days}d left`;
  const months = Math.round(days / 30.5);
  return `${months}mo · ${d}`;
}

function dlSortKey(d) {
  if (!d || d === 'TBC')  return 9e12;
  if (d === 'rolling')    return 9e13;
  return new Date(d).getTime();
}

function fmtAmount(o) {
  if (!o.amount_max_usd || o.amount_max_usd === 0) return 'TBC';
  if (o.amount_max_usd >= 1000000) return '$' + (o.amount_max_usd / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (o.amount_max_usd >= 1000)    return '$' + (o.amount_max_usd / 1000).toFixed(0) + 'k';
  return '$' + o.amount_max_usd;
}

function fitStars(n) {
  const labels = {5:'Excellent', 4:'Strong', 3:'Moderate', 2:'Low', 1:'Minimal'};
  return `<span class="fit-badge fit-${n}">${'●'.repeat(n)}${'○'.repeat(5-n)} ${n}</span>`;
}

function capitalize(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ── Partitioning ────────────────────────────────────────────────────────────
function isOpen(o) {
  const s = dlStatus(o.deadline);
  return s !== 'passed';
}

const OPEN_DATA    = DATA.filter(isOpen).sort((a, b) => {
  // Sort: soonest specific date first, then TBC, then rolling
  // Secondary: highest fit, then newest date_added
  const ka = dlSortKey(a.deadline), kb = dlSortKey(b.deadline);
  if (ka !== kb) return ka - kb;
  if (b.thematic_fit !== a.thematic_fit) return b.thematic_fit - a.thematic_fit;
  return new Date(b.date_added) - new Date(a.date_added);
});

const ARCHIVE_DATA = DATA.filter(o => !isOpen(o)).sort((a, b) => {
  // Sort: most recently closed first
  return new Date(b.deadline) - new Date(a.deadline);
});

// ── State ───────────────────────────────────────────────────────────────────
let currentTab = 'open';
let activeId   = null;

// ── Render ───────────────────────────────────────────────────────────────────
function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('result-count');

  if (!rows.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    count.textContent = '0 results';
    return;
  }
  empty.style.display = 'none';
  count.textContent = `${rows.length} grant${rows.length !== 1 ? 's' : ''}`;

  tbody.innerHTML = rows.map(o => {
    const st = dlStatus(o.deadline);
    const isNew = o.status === 'new';
    return `<tr onclick="openPanel('${o.id}')" id="row-${o.id}" class="${activeId === o.id ? 'active-row' : ''}">
      <td>${fitStars(o.thematic_fit)}</td>
      <td class="name-cell">
        <strong>${o.name}${isNew ? '<span class="new-dot" title="Newly added"></span>' : ''}</strong>
        <div class="org">${o.organization}</div>
      </td>
      <td><span class="type-pill type-${o.type}">${capitalize(o.type)}</span></td>
      <td class="amount-cell">${fmtAmount(o)}</td>
      <td class="dl-cell">
        <span class="dl-badge dl-${st}">
          <span class="dl-dot"></span>${dlLabel(o.deadline)}
        </span>
      </td>
      <td class="region-cell">${o.eligible_regions}</td>
    </tr>`;
  }).join('');
}

function applyFilters() {
  const q      = document.getElementById('q').value.toLowerCase();
  const fType  = document.getElementById('f-type').value;
  const fFit   = document.getElementById('f-fit').value;
  const fReg   = document.getElementById('f-region').value;

  const src = currentTab === 'open' ? OPEN_DATA : ARCHIVE_DATA;

  const filtered = src.filter(o => {
    if (fType && o.type !== fType) return false;
    if (fFit  && o.thematic_fit !== +fFit) return false;
    if (fReg  && !o.eligible_regions.toLowerCase().includes(fReg.toLowerCase())) return false;
    if (q) {
      const hay = (o.name + ' ' + o.organization + ' ' + o.description + ' ' + o.eligible_regions).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  renderTable(filtered);
}

function switchTab(tab) {
  currentTab = tab;
  closePanel(false);

  document.getElementById('tab-open').classList.toggle('active',    tab === 'open');
  document.getElementById('tab-archive').classList.toggle('active', tab === 'archive');

  // Reset filters
  document.getElementById('q').value = '';
  document.getElementById('f-type').value   = '';
  document.getElementById('f-fit').value    = '';
  document.getElementById('f-region').value = '';

  applyFilters();
}

// ── Panel ───────────────────────────────────────────────────────────────────
function openPanel(id) {
  const o = DATA.find(x => x.id === id);
  if (!o) return;

  // Update active row
  if (activeId) {
    const prev = document.getElementById('row-' + activeId);
    if (prev) prev.classList.remove('active-row');
  }
  activeId = id;
  const row = document.getElementById('row-' + id);
  if (row) row.classList.add('active-row');

  const st = dlStatus(o.deadline);

  document.getElementById('p-title').textContent = o.name;
  document.getElementById('p-org').textContent   = o.organization;
  document.getElementById('p-desc').textContent  = o.description;
  document.getElementById('p-deadline').innerHTML = `<span class="dl-badge dl-${st}"><span class="dl-dot"></span>${o.deadline === 'rolling' ? 'Rolling' : o.deadline === 'TBC' ? 'TBC' : o.deadline}</span>`;
  document.getElementById('p-amount').textContent  = o.amount_notes || fmtAmount(o);
  document.getElementById('p-region').textContent  = o.eligible_regions;
  document.getElementById('p-added').textContent   = o.date_added;
  document.getElementById('p-link').href            = o.url;

  const badgesEl = document.getElementById('p-badges');
  badgesEl.innerHTML = fitStars(o.thematic_fit) +
    `<span class="type-pill type-${o.type}" style="margin-left:4px">${capitalize(o.type)}</span>`;

  const notesWrap = document.getElementById('p-notes-wrap');
  if (o.notes) {
    document.getElementById('p-notes').textContent = o.notes;
    notesWrap.style.display = 'block';
  } else {
    notesWrap.style.display = 'none';
  }

  document.getElementById('backdrop').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function closePanel(clearActive = true) {
  document.getElementById('backdrop').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  if (clearActive && activeId) {
    const row = document.getElementById('row-' + activeId);
    if (row) row.classList.remove('active-row');
    activeId = null;
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePanel();
});

// ── Init ─────────────────────────────────────────────────────────────────────
document.getElementById('badge-open').textContent    = OPEN_DATA.length;
document.getElementById('badge-archive').textContent = ARCHIVE_DATA.length;
document.getElementById('updated-ts').innerHTML =
  `Last updated<br>${new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}`;

renderTable(OPEN_DATA);
</script>
