<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Future-of-Work Funding Tracker</title>
<style>
  :root {
    --blue-dark:  #1F4E79;
    --blue-mid:   #2E75B6;
    --blue-light: #BDD7EE;
    --bg:         #F4F7FB;
    --card-bg:    #FFFFFF;
    --border:     #D0DCE8;
    --text:       #1A2A3A;
    --muted:      #6B7C93;
    --fit5:       #C6EFCE; --fit5t: #276221;
    --fit4:       #E2EFDA; --fit4t: #375623;
    --fit3:       #FFEB9C; --fit3t: #7D5D00;
    --fit2:       #FFCCCC; --fit2t: #9C0006;
    --fit1:       #FFCCCC; --fit1t: #9C0006;
    --tag-gov:    #DDE8F5; --tag-gov-t:   #1F4E79;
    --tag-fnd:    #EAF3E8; --tag-fnd-t:   #276221;
    --tag-corp:   #F5ECD0; --tag-corp-t:  #7D5D00;
    --tag-ri:     #EDE7F6; --tag-ri-t:    #4A148C;
    --tag-other:  #F0F0F0; --tag-other-t: #555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ââ HEADER âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
  header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 100%);
    color: #fff;
    padding: 32px 40px 24px;
  }
  header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; }
  header p  { opacity: .8; margin-top: 6px; font-size: 13px; }
  .header-meta {
    display: flex; gap: 24px; margin-top: 16px; flex-wrap: wrap;
  }
  .header-meta span {
    background: rgba(255,255,255,.15);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
  }

  /* ââ CONTROLS âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
  .controls {
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
  }
  .controls input[type=search] {
    flex: 1; min-width: 200px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
  }
  .controls input[type=search]:focus { border-color: var(--blue-mid); }
  .controls select {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    font-size: 13px;
    background: #fff;
    cursor: pointer;
    outline: none;
  }
  .controls select:focus { border-color: var(--blue-mid); }
  #count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ââ GRID âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
  .grid {
    padding: 24px 40px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* ââ CARD âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px 16px;
    display: flex; flex-direction: column; gap: 10px;
    transition: box-shadow .15s, transform .15s;
  }
  .card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,.10);
    transform: translateY(-2px);
  }
  .card.hidden { display: none; }

  .card-top {
    display: flex; gap: 8px; align-items: flex-start;
  }
  .fit-badge {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 16px;
  }
  .fit-5 { background: var(--fit5); color: var(--fit5t); }
  .fit-4 { background: var(--fit4); color: var(--fit4t); }
  .fit-3 { background: var(--fit3); color: var(--fit3t); }
  .fit-2 { background: var(--fit2); color: var(--fit2t); }
  .fit-1 { background: var(--fit1); color: var(--fit1t); }

  .card-title { font-size: 14px; font-weight: 600; line-height: 1.35; }
  .card-org   { font-size: 12px; color: var(--muted); margin-top: 2px; }

  .tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .tag {
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .3px;
    text-transform: uppercase;
  }
  .tag-government       { background: var(--tag-gov);  color: var(--tag-gov-t);  }
  .tag-foundation       { background: var(--tag-fnd);  color: var(--tag-fnd-t);  }
  .tag-corporate        { background: var(--tag-corp); color: var(--tag-corp-t); }
  .tag-research_institution { background: var(--tag-ri);  color: var(--tag-ri-t);   }
  .tag-other            { background: var(--tag-other);color: var(--tag-other-t);}

  .tag-deadline-passed  { background: #FDECEA; color: #B00020; }
  .tag-deadline-soon    { background: #FFF3E0; color: #BF6000; }
  .tag-deadline-open    { background: var(--tag-fnd);  color: var(--tag-fnd-t);  }
  .tag-deadline-rolling { background: #E8F5E9; color: #2E7D32; }
  .tag-deadline-tbc     { background: #F5F5F5; color: #666; }

  .card-desc {
    font-size: 13px; color: #3A4A5A; line-height: 1.55;
  }

  .card-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px;
    font-size: 12px;
  }
  .meta-item { display: flex; flex-direction: column; }
  .meta-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .4px; }
  .meta-value { font-weight: 500; }

  .card-notes {
    font-size: 11.5px; color: var(--muted);
    background: #F8FAFC;
    border-left: 3px solid var(--blue-light);
    border-radius: 0 4px 4px 0;
    padding: 6px 10px;
    line-height: 1.5;
  }

  .card-link {
    display: inline-flex; align-items: center; gap: 5px;
    color: var(--blue-mid); text-decoration: none;
    font-size: 12px; font-weight: 600;
    margin-top: 2px;
  }
  .card-link:hover { text-decoration: underline; }
  .card-link svg { width: 12px; height: 12px; }

  /* ââ EMPTY STATE ââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
  #empty {
    display: none;
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  #empty svg { width: 48px; height: 48px; opacity: .35; margin-bottom: 12px; }

  /* ââ FOOTER âââââââââââââââââââââââââââââââââââââââââââââââââââââââââââââ */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--muted);
